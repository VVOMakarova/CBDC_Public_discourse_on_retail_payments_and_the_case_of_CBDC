<script>
const ideas = [
  {
    num: 1, cls: "n-teal", tag: "tg", tagText: "Концептуальная рамка",
    title: "Дискурс о платежах искажён структурно — не случайно",
    body: "Сетевые эффекты, концентрация экспертизы у заинтересованных, асимметрия ресурсов — пять причин, по которым объективного публичного обсуждения платёжной архитектуры не бывает.",
    eyebrow: "Идея № 1 · Концептуальная рамка",
    sub: "Почему публичное обсуждение платёжной архитектуры структурно предвзято — и что с этим делать",
    detail: `
<div class="section">
  <div class="sec-label">Центральный тезис</div>
  <div class="sec-text">Биндзайль фиксирует: публичные дебаты о платёжной архитектуре не могут быть объективными по структурным причинам — вне зависимости от доброй воли участников. Это не исключение, а правило работы отрасли.</div>
</div>
<div class="section">
  <div class="sec-label">Пять структурных причин</div>
  <div class="points">
    <div class="point"><span class="pdot" style="background:#5DCAA5"></span><span class="pt"><strong style="color:#E8EDF5">Техническая сложность.</strong> Розничные платёжные архитектуры многоуровневы и непрозрачны для неспециалистов. Детали дизайна (стандарты, протоколы, схемы расчётов) недоступны широкой аудитории.</span></div>
    <div class="point"><span class="pdot" style="background:#5DCAA5"></span><span class="pt"><strong style="color:#E8EDF5">Экспертиза = корыстный интерес.</strong> Те, кто знает отрасль лучше всех — работают в ней и финансово заинтересованы в конкретных исходах. Независимой экспертизы структурно мало.</span></div>
    <div class="point"><span class="pdot" style="background:#5DCAA5"></span><span class="pt"><strong style="color:#E8EDF5">Асимметрия ресурсов.</strong> Visa и Mastercard — компании с капитализацией $500–630 млрд. Они могут финансировать коммуникационные кампании, лоббирование и экспертные организации в масштабах, недостижимых для публичных институтов.</span></div>
    <div class="point"><span class="pdot" style="background:#5DCAA5"></span><span class="pt"><strong style="color:#E8EDF5">Обратная реклама.</strong> Слабые проекты шумят громко — им нужны сетевые эффекты. Сильные молчат до запуска — чтобы не дать конкурентам время на реакцию. Публичный дискурс заполнен голосами тех, кто продаёт надежду.</span></div>
    <div class="point"><span class="pdot" style="background:#5DCAA5"></span><span class="pt"><strong style="color:#E8EDF5">Неопределённость исходов.</strong> Разные архитектуры дают схожий социальный эффект, но кардинально расходятся в распределении ренты. Это создаёт стимулы тратить огромные ресурсы на борьбу за нарратив — непропорционально разнице в реальном общественном благе.</span></div>
  </div>
</div>
<div class="section">
  <div class="highlight">«Победа той или иной платёжной системы определяется не только её качеством, но и тем, чья коммуникационная стратегия оказалась эффективнее»</div>
</div>
<div class="insight">
  <div class="insight-label">Почему это важно для ЦВЦБ</div>
  <div class="insight-text">Эта рамка — ключ к пониманию всей дискуссии о цифровом рубле, цифровом евро и аналогах. Аргументы против ЦВЦБ нельзя рассматривать как нейтральный технический анализ — они структурно предвзяты. Это не делает их неверными, но требует систематического декодирования мотивов.</div>
</div>`
  },
  {
    num: 2, cls: "n-coral", tag: "tc", tagText: "Банки · нарративы",
    title: "Банки переворачивают причинно-следственную связь",
    body: "ЦВЦБ — реакция на уход наличных, а не атака на банки. Банки преподносят это как агрессивную экспансию ЦБ — и умалчивают об этом ключевом факте.",
    eyebrow: "Идея № 2 · Банки и нарративы",
    sub: "Три тезиса банков против ЦВЦБ — и один факт, о котором они не говорят",
    detail: `
<div class="section">
  <div class="sec-label">Что говорят банки</div>
  <div class="two-col">
    <div class="mini-card"><div class="mini-label" style="color:#F5C4B3">Тезис 1</div><div class="mini-body">ЦВЦБ спровоцирует отток депозитов и подорвёт банковское кредитование — угроза финансовой стабильности</div></div>
    <div class="mini-card"><div class="mini-label" style="color:#F5C4B3">Тезис 2</div><div class="mini-body">Рынок уже справляется: эффективные цифровые платёжные инструменты существуют, проблемы нет</div></div>
    <div class="mini-card"><div class="mini-label" style="color:#F5C4B3">Тезис 3</div><div class="mini-body">ЦБ превышает мандат, вмешиваясь в конкурентный рынок, который работает без него</div></div>
    <div class="mini-card"><div class="mini-label" style="color:#F5C4B3">Умолчание</div><div class="mini-body">ЦВЦБ — реакция на сокращение наличных, а не атака. Банки сами вытесняли ЦБ с розничного рынка</div></div>
  </div>
</div>
<div class="section">
  <div class="sec-label">Перевёрнутая логика</div>
  <div class="sec-text">Центральные банки исторически присутствовали в розничных платежах через наличные деньги. По мере того как потребители переходят на электронные платежи, доля наличных падает — и ЦБ органично теряет розничное присутствие. ЦВЦБ — это попытка сохранить роль центрального банка в новой реальности, а не экспансия.</div>
  <div class="sec-text" style="margin-top:10px;">Банки же представляют ситуацию иначе: мол, ЦБ, видя процветающий частный рынок, решил агрессивно захватить долю. Эта инверсия причины и следствия — намеренная риторическая стратегия.</div>
</div>
<div class="section">
  <div class="highlight">Банки редко признают, что ЦВЦБ — это реакция на их же успех в вытеснении наличных. Они преподносят защитную меру ЦБ как наступательную.</div>
</div>
<div class="insight">
  <div class="insight-label">Для России</div>
  <div class="insight-text">Нарратив об угрозе финансовой стабильности активно звучит и в российских дискуссиях о цифровом рубле. Разграничение между обоснованным риском (требует дизайнерских решений — холдинговые лимиты) и стратегической риторикой (требует аналитической критики) принципиально.</div>
</div>`
  },
  {
    num: 3, cls: "n-amber", tag: "ta", tagText: "Информационная асимметрия",
    title: "Чем шумнее проект — тем он слабее",
    body: "Зрелые проекты хранятся в секрете до запуска. Слабые шумят с самого начала — им нужны сетевые эффекты прямо сейчас. Это объясняет доминирование Bitcoin в дискурсе.",
