    sub: "Парадокс обратной рекламы в платёжной индустрии",
    detail: `
<div class="section">
  <div class="sec-label">Механизм</div>
  <div class="sec-text">В большинстве отраслей реклама сигнализирует о качестве: компании с хорошим продуктом могут позволить себе дорогостоящие кампании, и это само по себе несёт информацию. В розничных платежах логика перевёрнута.</div>
</div>
<div class="section">
  <div class="sec-label">Почему сильные молчат</div>
  <div class="points">
    <div class="point"><span class="pdot" style="background:#FAC775"></span><span class="pt">Зрелый проект с реальными шансами на успех держится в секрете, чтобы не дать конкурентам время для копирования или превентивного противодействия</span></div>
    <div class="point"><span class="pdot" style="background:#FAC775"></span><span class="pt">Маркетинг включается только перед запуском — когда продукт уже готов к выводу на рынок</span></div>
    <div class="point"><span class="pdot" style="background:#FAC775"></span><span class="pt">Устоявшиеся игроки акцентируют стабильность и надёжность, избегая публичных дискуссий о будущем</span></div>
  </div>
</div>
<div class="section">
  <div class="sec-label">Почему слабые шумят</div>
  <div class="points">
    <div class="point"><span class="pdot" style="background:#FAC775"></span><span class="pt">Проекты с неопределённым будущим вынуждены генерировать публичность с самого начала — им нужны сетевые эффекты и инвесторы прямо сейчас</span></div>
    <div class="point"><span class="pdot" style="background:#FAC775"></span><span class="pt">Без ресурсов на традиционный маркетинг они используют социальные медиа и громкие заявления</span></div>
    <div class="point"><span class="pdot" style="background:#FAC775"></span><span class="pt">Экзагерация аргументов — рациональная стратегия для проектов «вне денег»</span></div>
  </div>
</div>
<div class="section">
  <div class="highlight">Bitcoin и ряд стейблкоинов доминировали в дискуссиях о будущем денег при весьма ограниченной применимости в розничных платежах — именно потому, что активно искали нарративного присутствия.</div>
</div>
<div class="insight">
  <div class="insight-label">Следствие для наблюдателя</div>
  <div class="insight-text">Затяжное молчание некоторых центральных банков по ЦВЦБ может трактоваться как косвенный признак реального прогресса. Громкость публичной дискуссии вокруг проекта — обратный индикатор его зрелости, а не прямой.</div>
