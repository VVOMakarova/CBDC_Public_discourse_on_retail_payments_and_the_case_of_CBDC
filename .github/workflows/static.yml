    <div class="point"><span class="pdot" style="background:#85B7EB"></span><span class="pt"><strong style="color:#E8EDF5">Активная коммуникация целей и компромиссов.</strong> Не отдавать информационное поле лоббистам. Публично объяснять цели платёжной политики, признавать компромиссы и риски — вместо того чтобы избегать сложных вопросов.</span></div>
  </div>
</div>
<div class="section">
  <div class="highlight">«Пожалуй, единственная надёжная гарантия сохранения общественного интереса в розничных платежах — это сохранение сбалансированного сосуществования публичных и частных денег» — Biндзайль (2026)</div>
</div>
<div class="section">
  <div class="sec-label">Итоговый вывод статьи</div>
  <div class="sec-text">Если отрасли удастся убедить законодателей жёстко ограничить ЦВЦБ — альтернативы (усиленное регулирование или PIX/UPI-модель) могут достичь части целей ЦВЦБ. Но полноценного эквивалента нет. Центральные банки должны настаивать на присутствии публичных денег в розничных платежах — и делать это, опираясь на независимую аналитику, а не только на институциональный авторитет.</div>
</div>
<div class="insight">
  <div class="insight-label">Применимо к России</div>
  <div class="insight-text">Банк России находится в уязвимой позиции: он одновременно разрабатывает дизайн цифрового рубля, устанавливает правила участия и зависит от банков как агентов внедрения. Три обязательства Биндзайля — независимая экспертиза, прозрачность и активная коммуникация — прямо применимы к этой конфигурации.</div>
</div>`
  }
];

let currentIdx = 0;

function buildGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = ideas.map((idea, i) => `
    <div class="item" onclick="showDetail(${i})">
      <div class="item-top">
        <div class="num ${idea.cls}">${idea.num}</div>
        <div class="item-title">${idea.title}</div>
      </div>
      <div class="item-body">${idea.body}</div>
      <span class="tag ${idea.tag}">${idea.tagText}</span>
      <span class="arrow-hint">→</span>
    </div>
  `).join('');
}

function showDetail(idx) {
  currentIdx = idx;
  const idea = ideas[idx];
  document.getElementById('main-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('active');
  document.getElementById('d-eyebrow').textContent = idea.eyebrow;
  document.getElementById('d-title').textContent = idea.title;
  document.getElementById('d-sub').textContent = idea.sub;
  document.getElementById('d-body').innerHTML = idea.detail;
  document.getElementById('nav-counter').textContent = `${idx + 1} / ${ideas.length}`;
  document.getElementById('nav-prev').disabled = idx === 0;
  document.getElementById('nav-next').disabled = idx === ideas.length - 1;
  window.scrollTo(0, 0);
}

function showMain() {
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('active');
  window.scrollTo(0, 0);
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < ideas.length) showDetail(next);
}

buildGrid();
</script>
</body>
</html>
