    body: "Apple Pay контролирует NFC на 1,5 млрд устройств и зарабатывает миллиарды на интерчейндже — позиционируя себя как технического посредника вне платёжного регулирования.",
    eyebrow: "Идея № 4 · BigTech и регулирование",
    sub: "Как технологические платформы захватывают платёжную инфраструктуру, оставаясь вне регуляторного поля",
    detail: `
<div class="section">
  <div class="sec-label">Нарратив BigTech</div>
  <div class="sec-text">Apple Pay, Google Pay и аналоги позиционируют себя как технических посредников: мол, мы только отображаем банковскую карту на экране телефона и обеспечиваем безопасную аутентификацию. Никакого платёжного сервиса — просто удобный интерфейс. Зачем на нас распространять банковское регулирование?</div>
